<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #050508;
  --bg2:       #08080f;
  --border:    rgba(100,80,160,0.25);
  --border-hi: rgba(160,130,255,0.55);
  --ink:       #e8e4f8;
  --inkdim:    #9890c0;
  --inkfaint:  #3a3550;
  --glow:      rgba(140,100,255,0.3);
  --glow-hi:   rgba(180,140,255,0.5);
  --radius:    8px;
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Cormorant Garamond', Georgia, serif;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 80% 40% at 50% 0%, rgba(80,40,140,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 60% 30% at 50% 100%, rgba(40,20,80,0.12) 0%, transparent 70%);
}

/* ── HEADER ── */
header {
  text-align: center;
  padding: 52px 20px 28px;
  border-bottom: 1px solid var(--border);
  position: relative;
}
header::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 50%;
  transform: translateX(-50%);
  width: 200px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--border-hi), transparent);
}
header h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.6rem, 5vw, 3rem);
  font-weight: 400;
  letter-spacing: 0.45em;
  background: linear-gradient(135deg, #c0a8ff 0%, #e8d5ff 40%, #a080e0 80%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  margin-bottom: 10px;
}
header p {
  font-style: italic;
  color: var(--inkdim);
  font-size: 1.05rem;
  letter-spacing: 0.12em;
  font-weight: 300;
}

/* ── TABS ── */
.tabs {
  display: flex;
  justify-content: center;
  gap: 0;
  padding: 30px 20px 0;
  max-width: 900px;
  margin: 0 auto;
}
.tab {
  background: transparent;
  border: 1px solid var(--border);
  border-bottom: none;
  color: var(--inkfaint);
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  letter-spacing: 0.25em;
  padding: 10px 36px;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
}
.tab:first-child { border-radius: var(--radius) 0 0 0; }
.tab:last-child  { border-radius: 0 var(--radius) 0 0; }
.tab:hover { color: var(--inkdim); border-color: var(--border-hi); }
.tab.active {
  color: var(--ink);
  border-color: var(--border-hi);
  background: rgba(80,50,140,0.15);
}
.tab.active::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 0; right: 0; height: 1px;
  background: var(--bg2);
}

/* ── PANELS ── */
.panel { display: none; padding: 28px 20px 60px; max-width: 900px; margin: 0 auto; }
.panel.active { display: block; }

/* ── SECTION LABELS ── */
.lbl {
  font-family: 'Cinzel', serif;
  font-size: 0.58rem;
  letter-spacing: 0.28em;
  color: var(--inkdim);
  margin-bottom: 10px;
  text-transform: uppercase;
}

/* ── OUTPUT AREAS ── */
#build-out, #type-out {
  min-height: 160px;
  border: 1px solid var(--border);
  background: rgba(4,4,12,0.97);
  border-radius: var(--radius);
  padding: 18px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: flex-start;
  margin-bottom: 16px;
  box-shadow: inset 0 0 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,0,0,0.5);
  position: relative;
}
.ph {
  color: var(--inkfaint);
  font-style: italic;
  font-size: 0.95rem;
  align-self: center;
  letter-spacing: 0.05em;
}

/* ── GLYPH CELLS (output) ── */
.gc {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4px;
  border: 1px solid transparent;
  border-radius: var(--radius);
  transition: all 0.2s;
  background: transparent;
}
.gc.clickable { cursor: pointer; }
.gc.clickable:hover {
  border-color: var(--border-hi);
  box-shadow: 0 0 20px var(--glow), inset 0 0 10px rgba(100,60,200,0.1);
}
.gc img {
  width: 80px; height: 80px;
  display: block;
  filter: drop-shadow(0 0 6px var(--glow));
}
.sp { width: 30px; height: 80px; }
.gl { display: none; }

/* ── BUTTONS ── */
.btn-row { display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; }
.btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--inkdim);
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  padding: 9px 22px;
  cursor: pointer;
  border-radius: var(--radius);
  transition: all 0.22s;
}
.btn:hover {
  border-color: var(--border-hi);
  color: var(--ink);
  box-shadow: 0 0 14px var(--glow);
}
.btn:active { transform: scale(0.97); }

/* ── TYPE INPUT ── */
#type-input {
  width: 100%;
  background: rgba(4,4,12,0.97);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--ink);
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.2rem;
  padding: 14px 16px;
  resize: vertical;
  min-height: 90px;
  outline: none;
  margin-bottom: 16px;
  letter-spacing: 0.08em;
  transition: border-color 0.2s;
}
#type-input:focus { border-color: var(--border-hi); box-shadow: 0 0 20px var(--glow); }
#type-input::placeholder { color: var(--inkfaint); font-style: italic; }

/* ── PICKER ── */
#picker {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 18px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: rgba(4,4,12,0.97);
  box-shadow: inset 0 0 60px rgba(0,0,0,0.6);
}
.pc {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  padding: 8px 6px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  background: rgba(10,6,24,0.85);
  transition: all 0.2s;
  width: 96px;
}
.pc:hover {
  border-color: var(--border-hi);
  box-shadow: 0 0 22px var(--glow), inset 0 0 12px rgba(80,40,160,0.15);
  transform: translateY(-2px);
}
.pc:active { transform: translateY(0); }
.pc img {
  width: 76px; height: 76px;
  filter: drop-shadow(0 0 8px var(--glow));
}
.pl { display: none; }

/* ── SPACE KEY ── */
.sp-key {
  align-self: center;
  padding: 10px 28px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  color: var(--inkdim);
  cursor: pointer;
  transition: all 0.2s;
  background: rgba(10,6,24,0.85);
}
.sp-key:hover {
  border-color: var(--border-hi);
  color: var(--ink);
  box-shadow: 0 0 14px var(--glow);
}

/* ── REFERENCE KEY ── */
.ref-key {
  margin-top: 28px;
  padding: 16px 18px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: rgba(4,4,12,0.7);
}
.ref-key .lbl { margin-bottom: 12px; }
.ref-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
  gap: 6px;
}
.ref-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}
.ref-item img { width: 38px; height: 38px; filter: drop-shadow(0 0 4px var(--glow)); }
.ref-item span {
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  color: var(--inkdim);
  letter-spacing: 0.05em;
}

canvas { display: none; }
</style>
</head>
<body>

<header>
  <h1>CIPHER</h1>
  <p>Encrypt your words in ancient mystic glyphs</p>
</header>

<div class="tabs">
  <button class="tab active" id="tab-build" onclick="setMode('build')">BUILD — click glyphs</button>
  <button class="tab" id="tab-type" onclick="setMode('type')">ENCRYPT — type message</button>
</div>

<div class="panel active" id="mode-build">
  <div class="lbl">Composed Message</div>
  <div id="build-out"><span class="ph">Click a glyph below to begin composing...</span></div>
  <div class="btn-row">
    <button class="btn" onclick="buildDelete()">&#9003; Delete</button>
    <button class="btn" onclick="buildClear()">&#10005; Clear</button>
    <button class="btn" onclick="doDownload('build-out')">&#8659; Download PNG</button>
  </div>
  <div class="lbl">Glyph Alphabet</div>
  <div id="picker"></div>
</div>

<div class="panel" id="mode-type">
  <div class="lbl">Your Message (Greek Letters)</div>
  <textarea id="type-input" placeholder="Type Greek letters: α β γ δ ε ζ η θ ι κ λ μ ν ξ ο π ρ σ τ υ φ χ ψ ω" oninput="typeTranslate()" spellcheck="false"></textarea>
  <div class="lbl">Encrypted Output</div>
  <div id="type-out"><span class="ph">Your encrypted cipher will appear here...</span></div>
  <div class="btn-row">
    <button class="btn" onclick="document.getElementById('type-input').value='';typeTranslate()">&#10005; Clear</button>
    <button class="btn" onclick="doDownload('type-out')">&#8659; Download PNG</button>
  </div>

  <div class="ref-key">
    <div class="lbl">Cipher Key — Greek → Glyph</div>
    <div class="ref-grid" id="ref-grid"></div>
  </div>
</div>

<canvas id="canvas"></canvas>

<script>
var G = JSON.parse(document.getElementById('glyph-data').textContent);
var greek = 'αβγδεζηθικλμνξοπρστυφχψω'.split('');

// ── MODE SWITCH ──
function setMode(m) {
  document.getElementById('tab-build').classList.toggle('active', m==='build');
  document.getElementById('tab-type').classList.toggle('active', m==='type');
  document.getElementById('mode-build').classList.toggle('active', m==='build');
  document.getElementById('mode-type').classList.toggle('active', m==='type');
  if (m==='type') document.getElementById('type-input').focus();
}

// ── CELL BUILDER ──
function makeCell(ch, clickable, onRemove) {
  var cell = document.createElement('div');
  cell.className = 'gc' + (clickable ? ' clickable' : '');
  if (clickable) cell.onclick = onRemove;

  if (ch === ' ') {
    var sp = document.createElement('div');
    sp.className = 'sp';
    cell.appendChild(sp);
  } else if (G[ch]) {
    var img = document.createElement('img');
    img.src = G[ch]; img.alt = ch;
    cell.appendChild(img);
    // hidden label for download lookup
    var lbl = document.createElement('div');
    lbl.className = 'gl'; lbl.textContent = ch;
    cell.appendChild(lbl);
  } else {
    var u = document.createElement('div');
    u.style.cssText = 'width:80px;height:80px;display:flex;align-items:center;justify-content:center;font-size:28px;color:#6040a0;';
    u.textContent = ch;
    cell.appendChild(u);
    var lbl2 = document.createElement('div');
    lbl2.className = 'gl'; lbl2.textContent = ch;
    cell.appendChild(lbl2);
  }
  return cell;
}

// ── BUILD MODE ──
var buildChars = [];
function buildRender() {
  var out = document.getElementById('build-out');
  if (!buildChars.length) { out.innerHTML = '<span class="ph">Click a glyph below to begin composing...</span>'; return; }
  out.innerHTML = '';
  buildChars.forEach(function(ch, idx) {
    out.appendChild(makeCell(ch, true, function() { buildChars.splice(idx, 1); buildRender(); }));
  });
}
function buildAdd(ch) { buildChars.push(ch); buildRender(); }
function buildDelete() { buildChars.pop(); buildRender(); }
function buildClear() { buildChars = []; buildRender(); }

// ── TYPE MODE ──
function typeTranslate() {
  var text = document.getElementById('type-input').value;
  var out = document.getElementById('type-out');
  if (!text) { out.innerHTML = '<span class="ph">Your encrypted cipher will appear here...</span>'; return; }
  out.innerHTML = '';
  for (var i = 0; i < text.length; i++) {
    var ch = text[i];
    if (ch === '\n') {
      var br = document.createElement('div');
      br.style.cssText = 'width:100%;height:10px;';
      out.appendChild(br);
    } else {
      out.appendChild(makeCell(ch, false, null));
    }
  }
}

// ── DOWNLOAD PNG ──
var preloaded = {};
greek.forEach(function(k) {
  var im = new Image(); im.src = G[k]; preloaded[k] = im;
});

function doDownload(outId) {
  var cells = document.getElementById(outId).querySelectorAll('.gc');
  if (!cells.length) return;
  var GSIZE = 120, PAD = 28, GAP = 10;
  var perRow = Math.min(cells.length, 12);
  var numRows = Math.ceil(cells.length / perRow);
  var CW = perRow * (GSIZE + GAP) - GAP + PAD * 2;
  var CH = numRows * (GSIZE + GAP) - GAP + PAD * 2;
  var canvas = document.getElementById('canvas');
  canvas.width = CW; canvas.height = CH;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#050508';
  ctx.fillRect(0, 0, CW, CH);
  var col = 0, row = 0;
  cells.forEach(function(cell) {
    var glEl = cell.querySelector('.gl');
    var ch = glEl ? glEl.textContent : ' ';
    var x = PAD + col * (GSIZE + GAP);
    var y = PAD + row * (GSIZE + GAP);
    if (ch !== ' ' && preloaded[ch] && preloaded[ch].complete) {
      ctx.drawImage(preloaded[ch], x, y, GSIZE, GSIZE);
    }
    col++;
    if (col >= perRow) { col = 0; row++; }
  });
  var link = document.createElement('a');
  link.download = 'cipher.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// ── KEYBOARD SHORTCUT (build mode) ──
document.addEventListener('keydown', function(e) {
  if (!document.getElementById('mode-build').classList.contains('active')) return;
  if (e.ctrlKey || e.metaKey) return;
  if (e.key === 'Backspace') { e.preventDefault(); buildDelete(); }
  else if (e.key === ' ') { e.preventDefault(); buildAdd(' '); }
  else if (e.key.length === 1 && greek.includes(e.key)) buildAdd(e.key);
});

// ── BUILD PICKER ──
var picker = document.getElementById('picker');
greek.forEach(function(letter) {
  var card = document.createElement('div');
  card.className = 'pc';
  card.onclick = function() { buildAdd(letter); };
  if (G[letter]) {
    var img = document.createElement('img');
    img.src = G[letter]; img.alt = letter;
    card.appendChild(img);
  }
  var lbl = document.createElement('div');
  lbl.className = 'pl'; lbl.textContent = letter;
  card.appendChild(lbl);
  picker.appendChild(card);
});
// Space button
var spk = document.createElement('div');
spk.className = 'sp-key'; spk.textContent = 'SPACE';
spk.onclick = function() { buildAdd(' '); };
picker.appendChild(spk);

// ── REFERENCE KEY (type tab) ──
var refGrid = document.getElementById('ref-grid');
greek.forEach(function(letter) {
  var item = document.createElement('div');
  item.className = 'ref-item';
  if (G[letter]) {
    var img = document.createElement('img');
    img.src = G[letter]; img.alt = letter;
    item.appendChild(img);
  }
  var sp = document.createElement('span');
  sp.textContent = letter;
  item.appendChild(sp);
  refGrid.appendChild(item);
});
</script>
</body>
</html>
